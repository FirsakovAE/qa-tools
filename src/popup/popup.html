<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vue Inspector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #e5e5e5;
      padding: 16px;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 img { width: 18px; height: 18px; }
    .actions { display: flex; flex-direction: column; gap: 8px; }
    button {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button svg { width: 14px; height: 14px; flex-shrink: 0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-force {
      background: rgba(99, 102, 241, 0.15);
      color: #a5b4fc;
      border-color: rgba(99, 102, 241, 0.3);
    }
    #btn-force:hover:not(:disabled) {
      background: rgba(99, 102, 241, 0.25);
      border-color: rgba(99, 102, 241, 0.5);
    }
    #btn-reset {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border-color: rgba(239, 68, 68, 0.2);
    }
    #btn-reset:hover:not(:disabled) {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }
    .status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      transition: opacity 0.2s;
    }
    .status.success { color: #86efac; }
    .status.error { color: #fca5a5; }
  </style>
</head>
<body>
  <h1>
    <img src="/icons/icon32.png" alt="" />
    Vue Inspector
  </h1>
  <div class="actions">
    <button id="btn-force" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Forced Launch
    </button>
    <button id="btn-reset" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Reset Settings
    </button>
  </div>
  <div id="status" class="status"></div>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
